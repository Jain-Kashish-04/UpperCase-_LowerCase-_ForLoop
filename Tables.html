<!DOCTYPE html>
<html>
	<head>
		<title>
			Printing Tables 
		</title>
		
		<style>
			table{
				display:inline-block;
				margin:15px;
			}
			td{
				padding:5px;
			}
			
		</style>
	</head>

	<body>
	<p> Printing Tables 1 to 10 Using For Loop </p>
	
		
<script>

for(let i = 1; i <= 10; i++){

    document.write("<table>");

    for(let j = 1; j <= 10; j++){

        document.write( '<tr><td>' + (i*j) + '</td></tr>' );
    }

    document.write("</table>");
}

</script>

	</body>
	

</html>
